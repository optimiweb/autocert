name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"

      - name: Run Go tests
        run: go test -race ./...

      - name: Run Go vet
        run: go vet ./...

      - name: Build binary
        run: go build -o /tmp/autocert ./cmd/autocert

      - name: Build certificate importer
        run: go build -o /tmp/certctl ./cmd/certctl

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Lint Helm chart
        run: >-
          helm lint charts/autocert
          --set 'domains[0]=example.com'
          --set scaleway.projectID=test-project
          --set scaleway.existingSecret.name=scaleway-api

      - name: Render Helm chart
        run: >-
          helm template autocert charts/autocert
          --set 'domains[0]=example.com'
          --set scaleway.projectID=test-project
          --set scaleway.existingSecret.name=scaleway-api

      - name: Reject concurrent issuers
        run: |
          if helm template autocert charts/autocert \
            --set 'domains[0]=example.com' \
            --set scaleway.projectID=test-project \
            --set scaleway.existingSecret.name=scaleway-api \
            --set replicaCount=2; then
            echo "chart accepted an unsafe replica count" >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: false
          platforms: linux/amd64
          tags: autocert:ci

  release:
    name: Validate release tag
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.semver.outputs.version }}
    steps:
      - name: Validate stable SemVer tag
        id: semver
        env:
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          if [[ ! "$TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::Release tags must use stable SemVer: vMAJOR.MINOR.PATCH"
            exit 1
          fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

  publish:
    name: Build and publish image
    needs: release
    if: needs.release.result == 'success'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and publish container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
